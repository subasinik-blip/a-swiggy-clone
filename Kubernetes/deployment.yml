apiVersion: apps/v1
kind: Deployment
metadata:
  name: swiggy
  labels:
    app: swiggy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: swiggy
  template:
    metadata:
      labels:
        app: swiggy
    spec:
      containers:
      - name: swiggy
        image: 199167114159.dkr.ecr.eu-north-1.amazonaws.com/swiggy-clone:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
